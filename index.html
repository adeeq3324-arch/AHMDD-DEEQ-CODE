<!DOCTYPE html>
<html lang="so" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#070d1a"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Phone Finder"/>
<meta name="description" content="Phone Finder – GPS, Network, Battery tracker"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src https://fonts.gstatic.com; img-src * data:; connect-src https:;">
<title>📡 Phone Finder</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet"/>

<style>
/* ── CSS VARIABLES ─────────────────────────────────────────── */
:root{
  --bg:#070d1a;--card:#0e1628;--border:#162030;
  --accent:#00e5ff;--accent2:#7c3aed;
  --green:#00e676;--orange:#ff9100;--danger:#ff1744;
  --text:#e8f4f8;--muted:#5a7a8a;
  --radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:20px;
  --transition:.2s ease;
  --font-mono:'Share Tech Mono',monospace;
  --font-display:'Rajdhani',sans-serif;
  --font-body:'Exo 2',sans-serif;
}

/* ── RTL SUPPORT ───────────────────────────────────────────── */
[dir="rtl"] .info-val{text-align:left}
[dir="rtl"] .btn-row{flex-direction:row-reverse}
[dir="rtl"] .user-banner{flex-direction:row-reverse}
[dir="rtl"] .logo{flex-direction:row-reverse}
[dir="rtl"] .card-head{flex-direction:row-reverse}
[dir="rtl"] .map-btns{flex-direction:row-reverse}
[dir="rtl"] .lang-selector{right:auto;left:12px}
[dir="rtl"] .logout-btn{margin-left:0;margin-right:auto}
[dir="rtl"] .gps-grid{direction:rtl}

/* ── RESET ─────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);overscroll-behavior:none}
body{overflow-x:hidden}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--accent)44;border-radius:3px}

/* ── FOCUS ACCESSIBILITY ───────────────────────────────────── */
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
button:focus-visible,a:focus-visible,input:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* ── ANIMATIONS ────────────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes ripple{0%{transform:scale(.8);opacity:1}100%{transform:scale(2.6);opacity:0}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes scanDown{0%{top:-2px}100%{top:100%}}
@keyframes glow{0%,100%{box-shadow:0 0 15px var(--accent)22}50%{box-shadow:0 0 30px var(--accent)55}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* ── HEADER ────────────────────────────────────────────────── */
.header{
  position:sticky;top:0;z-index:100;
  background:linear-gradient(135deg,var(--card),#080f1c);
  border-bottom:1px solid var(--border);
  padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{
  width:34px;height:34px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:16px;
  flex-shrink:0;
}
.logo-title{font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--accent);letter-spacing:2px}
.logo-sub{font-size:9px;color:var(--muted);letter-spacing:1px}
.header-right{display:flex;align-items:center;gap:8px}
.logout-btn{
  background:transparent;border:1px solid var(--danger)44;
  color:var(--danger);padding:5px 10px;border-radius:var(--radius-sm);
  cursor:pointer;font-size:11px;font-weight:700;font-family:var(--font-body);
  transition:all var(--transition);white-space:nowrap;
}
.logout-btn:hover{background:rgba(255,23,68,.1);border-color:var(--danger)}

/* ── LANGUAGE SWITCHER ─────────────────────────────────────── */
.lang-btn{
  background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.2);
  color:var(--accent);padding:5px 10px;border-radius:var(--radius-sm);
  cursor:pointer;font-size:11px;font-weight:700;font-family:var(--font-body);
  transition:all var(--transition);position:relative;
}
.lang-btn:hover{background:rgba(0,229,255,.15)}
.lang-dropdown{
  position:absolute;top:calc(100% + 6px);right:0;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-md);overflow:hidden;z-index:200;
  animation:slideDown .2s ease;min-width:130px;
  box-shadow:0 8px 24px rgba(0,0,0,.4);
}
.lang-option{
  padding:9px 14px;font-size:12px;cursor:pointer;
  display:flex;align-items:center;gap:8px;
  transition:background var(--transition);border-bottom:1px solid var(--border)88;
}
.lang-option:last-child{border-bottom:none}
.lang-option:hover{background:rgba(0,229,255,.08)}
.lang-option.active{color:var(--accent);font-weight:700}

/* ── CONTAINER ─────────────────────────────────────────────── */
.container{max-width:480px;margin:0 auto;padding:14px 12px 40px;position:relative;z-index:1}

/* ── AUTH BOX ──────────────────────────────────────────────── */
.auth-box{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-xl);padding:22px;animation:fadeUp .4s ease;
}
.auth-head{text-align:center;margin-bottom:20px}
.auth-icon{font-size:42px;margin-bottom:6px}
.auth-title{font-family:var(--font-display);font-weight:700;font-size:22px;color:var(--accent);letter-spacing:2px}
.auth-sub{font-size:11px;color:var(--muted);margin-top:4px}

/* ── FORM ──────────────────────────────────────────────────── */
.field{margin-bottom:12px}
.field label{font-size:10px;color:var(--muted);letter-spacing:1px;display:block;margin-bottom:5px;font-weight:700}
.field input{
  width:100%;padding:11px 14px;
  background:rgba(22,32,48,.8);border:1px solid var(--border);
  border-radius:var(--radius-md);color:var(--text);font-size:15px;
  font-family:var(--font-body);transition:border-color var(--transition),background var(--transition);
  -webkit-appearance:none;
}
.field input:focus{outline:none;border-color:var(--accent);background:rgba(0,229,255,.04)}
.field input::placeholder{color:var(--muted)}
.field input.err-input{border-color:var(--danger)}
.field-hint{font-size:10px;color:var(--danger);margin-top:3px;display:none}
.field-hint.show{display:block}

/* ── PASSWORD STRENGTH ─────────────────────────────────────── */
.pass-strength{margin-top:5px;height:3px;border-radius:2px;background:var(--border);overflow:hidden}
.pass-strength-fill{height:100%;border-radius:2px;transition:width .3s,background .3s}

/* ── BUTTON ────────────────────────────────────────────────── */
.btn{
  width:100%;padding:12px;margin-bottom:4px;
  background:linear-gradient(135deg,rgba(0,229,255,.12),rgba(0,229,255,.22));
  border:1px solid rgba(0,229,255,.4);color:var(--accent);
  border-radius:var(--radius-md);font-size:13px;font-weight:700;
  cursor:pointer;letter-spacing:.8px;
  display:flex;align-items:center;justify-content:center;gap:6px;
  font-family:var(--font-body);transition:all var(--transition);
  -webkit-appearance:none;
}
.btn:active{transform:scale(.98)}
.btn:hover:not(:disabled){filter:brightness(1.1)}
.btn.green{background:linear-gradient(135deg,rgba(0,230,118,.1),rgba(0,230,118,.2));border-color:rgba(0,230,118,.4);color:var(--green)}
.btn.danger{background:linear-gradient(135deg,rgba(255,23,68,.1),rgba(255,23,68,.2));border-color:rgba(255,23,68,.4);color:var(--danger)}
.btn.purple{background:linear-gradient(135deg,rgba(124,58,237,.1),rgba(124,58,237,.2));border-color:rgba(124,58,237,.4);color:var(--accent2)}
.btn.muted{background:rgba(22,32,48,.8);border-color:var(--border);color:var(--muted);font-size:11px;padding:8px 14px;width:auto}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}

/* ── ALERT ─────────────────────────────────────────────────── */
.alert{padding:9px 13px;border-radius:9px;font-size:12px;margin-bottom:12px;animation:fadeUp .3s ease;line-height:1.6}
.alert.err{background:rgba(255,23,68,.08);border:1px solid rgba(255,23,68,.3);color:var(--danger)}
.alert.ok{background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.3);color:var(--green)}
.alert.info{background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.3);color:var(--accent)}
.alert.warn{background:rgba(255,145,0,.08);border:1px solid rgba(255,145,0,.3);color:var(--orange)}

/* ── SWITCH LINK ───────────────────────────────────────────── */
.switch-link{text-align:center;margin-top:14px;font-size:12px;color:var(--muted)}
.switch-link span{color:var(--accent);cursor:pointer;font-weight:700}

/* ── CARD ──────────────────────────────────────────────────── */
.card{
  background:var(--card);border-radius:var(--radius-lg);padding:16px;
  margin-bottom:12px;animation:fadeUp .4s ease;
  border:1px solid var(--border);
}
.card-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.card-icon{font-size:15px}
.card-title{font-family:var(--font-display);font-weight:700;font-size:13px;letter-spacing:1.5px}
.card-title.green{color:var(--green)}
.card-title.accent{color:var(--accent)}
.card-title.purple{color:var(--accent2)}
.card-title.danger{color:var(--danger)}
.card-title.orange{color:var(--orange)}

/* ── INFO ROW ──────────────────────────────────────────────── */
.info-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:7px 0;border-bottom:1px solid var(--border);
}
.info-row:last-child{border-bottom:none}
.info-label{font-size:11px;color:var(--muted);flex-shrink:0;padding-inline-end:8px}
.info-val{font-size:12px;font-weight:600;max-width:60%;text-align:right;word-break:break-all}
[dir="rtl"] .info-val{text-align:left}
.info-val.mono{font-family:var(--font-mono)}
.info-val.green{color:var(--green)}
.info-val.accent{color:var(--accent)}
.info-val.orange{color:var(--orange)}
.info-val.danger{color:var(--danger)}
.info-val.muted{color:var(--muted)}

/* ── GPS BOX ───────────────────────────────────────────────── */
.gps-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  background:rgba(0,230,118,.05);border:1px solid rgba(0,230,118,.15);
  border-radius:var(--radius-md);padding:12px;margin-bottom:10px;
}
.gps-cell .gk{font-size:9px;color:var(--muted);letter-spacing:.5px;margin-bottom:2px}
.gps-cell .gv{font-size:12px;font-weight:600;font-family:var(--font-mono)}

/* ── MAP BUTTONS ───────────────────────────────────────────── */
.map-btns{display:flex;gap:8px;margin-bottom:10px}
.map-btn{
  flex:1;display:block;text-align:center;padding:9px 0;
  border-radius:var(--radius-md);font-size:12px;font-weight:700;
  text-decoration:none;transition:opacity var(--transition),transform var(--transition);
}
.map-btn:active{opacity:.7;transform:scale(.97)}
.map-btn.gmap{background:rgba(0,230,118,.12);border:1px solid rgba(0,230,118,.35);color:var(--green)}
.map-btn.amap{background:rgba(0,229,255,.12);border:1px solid rgba(0,229,255,.35);color:var(--accent)}

/* ── RADAR DOT ─────────────────────────────────────────────── */
.radar-wrap{position:relative;width:14px;height:14px;flex-shrink:0}
.radar-dot{width:14px;height:14px;border-radius:50%;position:absolute}
.radar-ring{width:14px;height:14px;border-radius:50%;position:absolute;animation:ripple 1.5s infinite}

/* ── BATTERY BAR ───────────────────────────────────────────── */
.bat-row{display:flex;align-items:center;gap:8px;margin:8px 0}
.bat-track{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.bat-fill{height:100%;border-radius:4px;transition:width .5s}
.bat-val{font-family:var(--font-mono);font-size:12px;min-width:44px}

/* ── USER BANNER ───────────────────────────────────────────── */
.user-banner{
  background:linear-gradient(135deg,rgba(0,229,255,.06),rgba(124,58,237,.06));
  border:1px solid rgba(0,229,255,.15);border-radius:var(--radius-lg);
  padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:12px;
  animation:fadeUp .4s ease;
}
.user-ava{
  width:44px;height:44px;border-radius:var(--radius-md);flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:20px;
}
.user-info{flex:1;min-width:0}
.user-name{font-weight:700;font-size:14px}
.user-meta{font-size:11px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.status-box{text-align:center;flex-shrink:0}
.status-label{font-size:9px;font-weight:700;letter-spacing:.5px;margin-top:5px}

/* ── SESSION BADGE ─────────────────────────────────────────── */
.session-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.25);
  border-radius:20px;padding:3px 8px;font-size:9px;color:var(--green);
  font-weight:700;letter-spacing:.5px;margin-top:4px;
}

/* ── RECOVER ───────────────────────────────────────────────── */
.recover-toggle{
  display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;padding:4px 0;
}
.recover-toggle span{font-size:12px;font-weight:700;color:var(--danger)}
.recover-result{
  margin-top:14px;background:rgba(255,23,68,.06);
  border:1px solid rgba(255,23,68,.2);border-radius:var(--radius-md);padding:14px;
  animation:fadeUp .3s ease;
}
.recover-gps{
  background:rgba(0,230,118,.06);border-radius:10px;
  padding:12px;margin:10px 0;
}
.recover-gps .rk{font-size:10px;color:var(--muted);margin-bottom:5px;letter-spacing:.5px}
.recover-gps .rv{font-family:var(--font-mono);font-size:13px;color:var(--green)}
.recover-gps .ra{font-size:11px;color:var(--muted);margin-top:3px}

/* ── FOOTER ────────────────────────────────────────────────── */
.footnote{text-align:center;font-size:10px;color:var(--muted);padding:6px 0 24px;line-height:1.9}

/* ── DIVIDER ───────────────────────────────────────────────── */
.divider{height:1px;background:var(--border);margin:10px 0}

/* ── SPINNER ───────────────────────────────────────────────── */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-inline-end:6px}

/* ── SCAN LINE ─────────────────────────────────────────────── */
.scan-wrap{position:relative;overflow:hidden;border-radius:var(--radius-md)}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--green),transparent);animation:scanDown 2s linear infinite;pointer-events:none;z-index:2}

/* ── INSTALL BANNER ────────────────────────────────────────── */
.install-banner{
  background:linear-gradient(135deg,rgba(0,230,118,.1),rgba(0,229,255,.08));
  border:1px solid rgba(0,230,118,.3);border-radius:var(--radius-lg);
  padding:14px;margin-bottom:12px;animation:fadeUp .5s ease;
}
.install-banner h3{font-size:13px;color:var(--green);font-weight:700;margin-bottom:6px}
.install-steps{font-size:11px;color:var(--muted);line-height:1.9;padding-inline-start:4px}
.install-steps b{color:var(--text)}

/* ── BG GLOW ───────────────────────────────────────────────── */
.glow1,.glow2{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
.glow1{top:15%;right:-80px;width:250px;height:250px;background:radial-gradient(circle,rgba(0,229,255,.04),transparent 70%)}
.glow2{bottom:10%;left:-80px;width:220px;height:220px;background:radial-gradient(circle,rgba(124,58,237,.04),transparent 70%)}

/* ── LOADING PLACEHOLDER ───────────────────────────────────── */
.placeholder{text-align:center;color:var(--muted);font-size:12px;padding:12px 0;animation:pulse 1s infinite}

/* ── COPY BTN ──────────────────────────────────────────────── */
.copy-btn{
  background:none;border:none;color:var(--accent);cursor:pointer;
  font-size:11px;padding:2px 6px;border-radius:4px;
  transition:background var(--transition);margin-inline-start:4px;
}
.copy-btn:hover{background:rgba(0,229,255,.1)}

/* ── RESPONSIVE ────────────────────────────────────────────── */
@media(max-width:380px){
  .gps-grid{grid-template-columns:1fr;gap:8px}
  .map-btns{flex-direction:column}
  .btn-row{flex-direction:column}
  .btn-row .btn.muted{width:100%}
}
@media(min-width:640px){
  .container{padding:20px 16px 48px}
  .auth-box{padding:30px}
}

/* ── HIGH CONTRAST MEDIA QUERY ─────────────────────────────── */
@media(prefers-reduced-motion:reduce){
  *{animation-duration:.01ms!important;transition-duration:.01ms!important}
}
</style>
</head>
<body>

<div class="glow1" aria-hidden="true"></div>
<div class="glow2" aria-hidden="true"></div>

<!-- HEADER -->
<header class="header" role="banner">
  <div class="logo">
    <div class="logo-icon" aria-hidden="true">📡</div>
    <div>
      <div class="logo-title">PHONE FINDER</div>
      <div class="logo-sub">LIVE TRACKER v3.0</div>
    </div>
  </div>
  <div class="header-right">
    <!-- Language Switcher -->
    <div style="position:relative" id="langWrapper">

      <div class="lang-dropdown" id="langDropdown" style="display:none" role="listbox" aria-label="Language selection">
        <div class="lang-option" role="option" onclick="setLang('so')" data-lang="so">🇸🇴 Soomaali</div>
        <div class="lang-option" role="option" onclick="setLang('en')" data-lang="en">🇬🇧 English</div>
        <div class="lang-option" role="option" onclick="setLang('ar')" data-lang="ar">🇸🇦 العربية</div>
        <div class="lang-option" role="option" onclick="setLang('zh')" data-lang="zh">🇨🇳 中文</div>
      </div>
    </div>
    <button class="logout-btn" id="logoutBtn" style="display:none" onclick="logout()" aria-label="Log out">
      <span id="txt_logout">KA BAX</span>
    </button>
  </div>
</header>

<main class="container" role="main">
  <div id="authBox"></div>
  <div id="dashboard" style="display:none"></div>
</main>

   I18N RUNTIME
   ═══════════════════════════════════════════════════════════════ */
let lang = 'so';
function t(key, ...args){
  let s = (LANGS[lang]||LANGS.so)[key] || key;
  args.forEach(a => { s = s.replace('%d', a); });
  return s;
}
function setLang(code){
  lang = code;
  const cfg = LANGS[code]||LANGS.so;
  document.documentElement.lang = cfg.code;
  document.documentElement.dir = cfg.dir;
  document.getElementById('currentLangLabel').textContent = cfg.label;
  // Mark active
  document.querySelectorAll('.lang-option').forEach(el=>{
    el.classList.toggle('active', el.dataset.lang === code);
  });
  // Persist
  try{ localStorage.setItem('pf_lang', code); }catch(_){}
  // Re-render
  hideLangMenu();
  if(currentUser) renderDashboard();
  else renderAuth();
}
function toggleLangMenu(){
  const dd = document.getElementById('langDropdown');
  const btn = document.getElementById('langBtn');
  const visible = dd.style.display !== 'none';
  dd.style.display = visible ? 'none' : 'block';
  btn.setAttribute('aria-expanded', !visible);
}
function hideLangMenu(){
  document.getElementById('langDropdown').style.display = 'none';
  document.getElementById('langBtn').setAttribute('aria-expanded','false');
}
document.addEventListener('click', e=>{
  if(!document.getElementById('langWrapper').contains(e.target)) hideLangMenu();
});

/* ═══════════════════════════════════════════════════════════════
   SECURITY HELPERS
   ═══════════════════════════════════════════════════════════════ */
const SEC = {
  // Simple hash using Web Crypto API — async, for registration
  async hashPass(plain){
    if(window.crypto && window.crypto.subtle){
      try{
        const enc = new TextEncoder().encode(plain);
        const hash = await crypto.subtle.digest('SHA-256', enc);
        return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
      }catch(_){}
    }
    // Fallback: simple obfuscation (not secure, but better than plaintext)
    return btoa(plain + '_pf_salt_2024').split('').reverse().join('');
  },
  sanitize(str){ return String(str).replace(/[<>"'&]/g,'').trim().slice(0,200) },
  validateEmail(e){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e) },
  validatePhone(p){ return p.replace(/\D/g,'').length >= 7 },
  validatePassword(p){ return p.length >= 8 },
  // Rate limiting: max 5 login attempts per 60s
  loginAttempts: {},
  canAttempt(email){
    const now = Date.now();
    const key = email.toLowerCase();
    if(!this.loginAttempts[key]) this.loginAttempts[key] = {count:0, reset:now+60000};
    if(now > this.loginAttempts[key].reset) this.loginAttempts[key] = {count:0, reset:now+60000};
    return this.loginAttempts[key].count < 5;
  },
  recordAttempt(email, success){
    const key = email.toLowerCase();
    if(!this.loginAttempts[key]) this.loginAttempts[key] = {count:0, reset:Date.now()+60000};
    if(success) this.loginAttempts[key].count = 0;
    else this.loginAttempts[key].count++;
  }
};

/* ═══════════════════════════════════════════════════════════════
   DATABASE (localStorage with versioning + caching)
   ═══════════════════════════════════════════════════════════════ */
const DB = {
  VERSION: 2,
  _cache: {},
  _key(k){ return `pf_v${this.VERSION}_${k}`; },
  _read(k){ try{ return JSON.parse(localStorage.getItem(this._key(k))||'null'); }catch(_){return null;} },
  _write(k,v){ try{ localStorage.setItem(this._key(k),JSON.stringify(v)); return true; }catch(e){ console.warn('DB write failed',e); return false; } },
  getUsers(){ return this._read('users')||[]; },
  saveUser(u){
    const all=this.getUsers();
    const i=all.findIndex(x=>x.email===u.email);
    i>=0?all[i]=u:all.push(u);
    this._write('users',all);
    this._cache['user_'+u.email]=u;
  },
  find(email){
    if(this._cache['user_'+email]) return this._cache['user_'+email];
    const u=this.getUsers().find(x=>x.email===email.toLowerCase())||null;
    if(u) this._cache['user_'+email]=u;
    return u;
  },
  saveSnap(email,snap){
    const all=this._read('snaps')||{};
    all[email]={...snap,ts:new Date().toISOString()};
    this._write('snaps',all);
    this._cache['snap_'+email]={...all[email]};
  },
  getSnap(email){
    if(this._cache['snap_'+email]) return this._cache['snap_'+email];
    const all=this._read('snaps')||{};
    const s=all[email]||null;
    if(s) this._cache['snap_'+email]=s;
    return s;
  },
  // Session: 8-hour TTL
  saveSession(email){
    this._write('session',{email,exp:Date.now()+8*3600000,ts:new Date().toISOString()});
  },
  getSession(){
    const s=this._read('session');
    if(!s||Date.now()>s.exp) return null;
    return s;
  },
  clearSession(){ try{localStorage.removeItem(this._key('session'));}catch(_){} },
  // Migrate old data
  migrate(){
    try{
      const old=JSON.parse(localStorage.getItem('pf_users')||'null');
      if(old){
        this._write('users',old);
        localStorage.removeItem('pf_users');
      }
      const oldS=JSON.parse(localStorage.getItem('pf_snaps')||'null');
      if(oldS){
        this._write('snaps',oldS);
        localStorage.removeItem('pf_snaps');
      }
    }catch(_){}
  }
};

/* ═══════════════════════════════════════════════════════════════
   LOGGER
   ═══════════════════════════════════════════════════════════════ */
const LOG = {
  _logs: [],
  info(msg, data={}){ this._log('INFO',msg,data); },
  warn(msg, data={}){ this._log('WARN',msg,data); console.warn('[PF]',msg,data); },
  error(msg, data={}){ this._log('ERR',msg,data); console.error('[PF]',msg,data); },
  _log(level,msg,data){
    this._logs.push({level,msg,data,ts:new Date().toISOString()});
    if(this._logs.length>100) this._logs.shift();
  },
  export(){ return JSON.stringify(this._logs,null,2); }
};

/* ═══════════════════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════════════════ */
function fmt(iso){
  if(!iso) return '—';
  try{ return new Date(iso).toLocaleString(LANGS[lang].code); }catch(_){ return iso; }
}
function getBrowser(){
  const ua=navigator.userAgent;
  if(/SamsungBrowser/i.test(ua)) return 'Samsung Browser';
  if(/OPR|Opera/i.test(ua)) return 'Opera';
  if(/Edg/i.test(ua)) return 'Edge';
  if(/Firefox/i.test(ua)) return 'Firefox';
  if(/Chrome/i.test(ua)) return 'Chrome';
  if(/Safari/i.test(ua)) return 'Safari';
  return 'Other';
}
function getDevType(){
  const ua=navigator.userAgent;
  if(/tablet|ipad/i.test(ua)) return 'Tablet 📱';
  if(/mobile|android|iphone/i.test(ua)) return 'Mobile 📱';
  return 'Desktop 🖥️';
}
function getConn(){
  const c=navigator.connection||navigator.mozConnection||navigator.webkitConnection;
  if(!c) return {type:'—',effectiveType:'—',downlink:null,rtt:null,saveData:false};
  return {type:c.type||'—',effectiveType:c.effectiveType||'—',downlink:c.downlink,rtt:c.rtt,saveData:!!c.saveData};
}
function netLabel(info){
  const t=info.connection.type, et=info.connection.effectiveType;
  if(t==='wifi') return t('wifi');
  if(et==='4g') return '📶 4G / LTE';
  if(et==='3g') return '📶 3G';
  if(et==='2g') return '📶 2G';
  return et||t||'—';
}
function infoRow(label, val, cls='', copyable=false){
  const copyBtn = copyable && val && val!=='—' ? `<button class="copy-btn" onclick="copyText('${String(val).replace(/'/g,'&apos;')}')" aria-label="Copy">${t('copy')}</button>` : '';
  return `<div class="info-row" role="row">
    <span class="info-label" role="cell">${label}</span>
    <span class="info-val ${cls}" role="cell">${val||'—'}${copyBtn}</span>
  </div>`;
}
function alertHtml(msg, type='err'){
  const icons={err:'⚠️',ok:'✅',info:'ℹ️',warn:'⚡'};
  return `<div class="alert ${type}" role="alert" aria-live="polite">${icons[type]||''} ${msg}</div>`;
}
function copyText(txt){
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(()=>{ showToast(t('copied')); }).catch(()=>{});
  }
}
function showToast(msg){
  let toast=document.getElementById('globalToast');
  if(!toast){
    toast=document.createElement('div');
    toast.id='globalToast';
    toast.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,230,118,.9);color:#000;padding:8px 16px;border-radius:20px;font-size:12px;font-weight:700;z-index:999;transition:opacity .3s';
    document.body.appendChild(toast);
  }
  toast.textContent=msg;toast.style.opacity='1';
  clearTimeout(toast._t);
  toast._t=setTimeout(()=>{ toast.style.opacity='0'; },1500);
}
function passStrength(pass){
  let score=0;
  if(pass.length>=8)score++;
  if(pass.length>=12)score++;
  if(/[A-Z]/.test(pass))score++;
  if(/[0-9]/.test(pass))score++;
  if(/[^A-Za-z0-9]/.test(pass))score++;
  const colors=['','var(--danger)','var(--orange)','var(--orange)','var(--green)','var(--green)'];
  return {score, color:colors[score]||'var(--muted)', pct:Math.min(100,score*20)};
}

function updatePassStrength(val){
  const fill=document.getElementById('passFill');
  if(!fill)return;
  const s=passStrength(val);
  fill.style.width=s.pct+'%';
  fill.style.background=s.color;
}

function switchPage(){ page=page==='login'?'register':'login'; renderAuth(); }

function showAuthAlert(msg,type='err'){
  const el=document.getElementById('authAlert');
  if(el) el.innerHTML=alertHtml(msg,type);
}

function setButtonLoading(id, loading){
  const btn=document.getElementById(id);
  if(!btn)return;
  if(loading){ btn.disabled=true; btn.dataset.orig=btn.innerHTML; btn.innerHTML=`<span class="spinner"></span>`; }
  else{ btn.disabled=false; btn.innerHTML=btn.dataset.orig||btn.innerHTML; }
}

async function doLogin(){
  const email=(document.getElementById('aEmail').value||'').trim().toLowerCase();
  const pass=document.getElementById('aPass').value||'';
  if(!email||!pass) return showAuthAlert(t('err_email_pass'));
  if(!SEC.validateEmail(email)) return showAuthAlert(t('err_invalid_email'));
  if(!SEC.canAttempt(email)) return showAuthAlert('Too many attempts — wait 60 seconds','warn');
  setButtonLoading('loginBtn',true);
  try{
    const hash=await SEC.hashPass(pass);
    const u=DB.find(email);
    // Support legacy plaintext AND hashed passwords
    const match=u && (u.passHash===hash || u.pass===pass);
    if(!match){ SEC.recordAttempt(email,false); showAuthAlert(t('err_wrong_creds')); return; }
    SEC.recordAttempt(email,true);
    // Upgrade to hashed if still plaintext
    if(u.pass && !u.passHash){ u.passHash=hash; delete u.pass; DB.saveUser(u); }
    currentUser=u;
    DB.saveSession(email);
    LOG.info('Login success',{email});
    renderDashboard();
  }catch(e){ LOG.error('Login error',e); showAuthAlert('Login error — try again','err'); }
  finally{ setButtonLoading('loginBtn',false); }
}

async function doRegister(){
  const name=SEC.sanitize(document.getElementById('rName').value||'');
  const phone=SEC.sanitize(document.getElementById('rPhone').value||'');
  const email=(document.getElementById('rEmail').value||'').trim().toLowerCase();
  const pass=document.getElementById('rPass').value||'';
  if(!name||!phone||!email||!pass) return showAuthAlert(t('err_fill_all'));
  if(!SEC.validateEmail(email)) return showAuthAlert(t('err_invalid_email'));
  if(!SEC.validatePhone(phone)) return showAuthAlert(t('err_short_phone'));
  if(!SEC.validatePassword(pass)) return showAuthAlert(t('err_pass_weak'));
  if(DB.find(email)) return showAuthAlert(t('err_email_taken'));
  setButtonLoading('registerBtn',true);
  try{
    const passHash=await SEC.hashPass(pass);
    const u={name,phone,email,passHash,createdAt:new Date().toISOString(),lang};
    DB.saveUser(u);
    currentUser=u;
    DB.saveSession(email);
    LOG.info('Register success',{email});
    renderDashboard();
  }catch(e){ LOG.error('Register error',e); showAuthAlert('Registration failed — try again','err'); }
  finally{ setButtonLoading('registerBtn',false); }
}

function renderGpsBody(){
  if(!currentSnap) return `<div style="text-align:center;padding:18px 0;color:var(--muted);font-size:13px">Goob wali la helin — badhanka hoos riix</div>`;
  const s=currentSnap;
  const acc=s.accuracy<50?'green':'orange';
  let extra='';
  if(s.altitude!=null) extra+=`<div class="gps-cell"><div class="gk">ALTITUDE</div><div class="gv" style="color:var(--muted)">${s.altitude}m</div></div>`;
  if(s.speed!=null&&s.speed>0) extra+=`<div class="gps-cell"><div class="gk">SPEED</div><div class="gv" style="color:var(--orange)">${(s.speed*3.6).toFixed(1)} km/h</div></div>`;
  return`
  <div class="scan-wrap">
    <div class="scan-line" aria-hidden="true"></div>
    <div class="gps-grid" role="table" aria-label="GPS data">
      <div class="gps-cell"><div class="gk">LATITUDE</div><div class="gv" style="color:var(--green)">${s.lat.toFixed(7)}</div></div>
      <div class="gps-cell"><div class="gk">LONGITUDE</div><div class="gv" style="color:var(--green)">${s.lng.toFixed(7)}</div></div>
      <div class="gps-cell"><div class="gk">${t('accuracy').toUpperCase()}</div><div class="gv" style="color:var(--${acc})">±${s.accuracy}m</div></div>
      <div class="gps-cell"><div class="gk">TIME</div><div class="gv" style="color:var(--accent);font-size:10px">${fmt(s.ts)}</div></div>
      ${extra}
    </div>
  </div>
  <div class="map-btns" style="margin-top:10px">
    <a class="map-btn gmap" href="https://www.google.com/maps?q=${s.lat},${s.lng}" target="_blank" rel="noopener noreferrer">${t('gmap')}</a>
    <a class="map-btn amap" href="https://maps.apple.com/?q=${s.lat},${s.lng}" target="_blank" rel="noopener noreferrer">${t('amap')}</a>
  </div>`;
}

function setRadar(status){
  const dot=document.getElementById('radarDot');
  const ring=document.getElementById('radarWrap');
  const lbl=document.getElementById('statusLabel');
  if(!dot||!lbl)return;
  const map={
    idle:{col:'var(--muted)',label:t('status_idle'),ring:false},
    tracking:{col:'var(--orange)',label:t('status_tracking'),ring:false},
    ok:{col:'var(--green)',label:t('status_ok'),ring:true},
    error:{col:'var(--danger)',label:t('status_err'),ring:false}
  }[status]||{col:'var(--muted)',label:'—',ring:false};
  dot.style.background=map.col;
  lbl.style.color=map.col;
  lbl.textContent=map.label;
  lbl.style.animation=status==='tracking'?'blink 1s infinite':'none';
  let existing=ring.querySelector('.radar-ring');
  if(map.ring&&!existing){ const r=document.createElement('div'); r.className='radar-ring'; r.style.background=map.col; ring.appendChild(r); }
  else if(!map.ring&&existing){ existing.remove(); }
}

function startGPS(silent=false){
  if(!navigator.geolocation){
    if(!silent) showGpsAlert(t('gps_no_support'),'err');
    setRadar('error'); return;
  }
  setRadar('tracking');
  document.getElementById('gpsAlert').innerHTML='';
  if(watchId) navigator.geolocation.clearWatch(watchId);
  watchId=navigator.geolocation.watchPosition(
    pos=>{
      const s={
        lat:pos.coords.latitude, lng:pos.coords.longitude,
        accuracy:Math.round(pos.coords.accuracy),
        altitude:pos.coords.altitude!=null?Math.round(pos.coords.altitude):null,
        speed:pos.coords.speed, heading:pos.coords.heading,
      };
      currentSnap={...s,ts:new Date().toISOString()};
      DB.saveSnap(currentUser.email,currentSnap);
      const gb=document.getElementById('gpsBody');
      if(gb) gb.innerHTML=renderGpsBody();
      setRadar('ok');
      LOG.info('GPS updated',{lat:s.lat,lng:s.lng,acc:s.accuracy});
    },
    err=>{
      setRadar('error');
      LOG.warn('GPS error',{code:err.code,msg:err.message});
      if(!silent){
        const msgs={1:t('gps_denied'),2:t('gps_unavail'),3:t('gps_timeout')};
        showGpsAlert(msgs[err.code]||t('gps_unavail'),'err');
      }
    },
    {enableHighAccuracy:true,timeout:15000,maximumAge:5000}
  );
}

function showGpsAlert(msg,type){
  const el=document.getElementById('gpsAlert');
  if(el) el.innerHTML=alertHtml(msg,type);
}

/* ── DEVICE INFO ───────────────────────────────────────────── */
async function gatherDeviceInfo(){
  const info={
    platform:navigator.platform||'—',
    browser:getBrowser(),
    language:navigator.language||'—',
    cookiesEnabled:navigator.cookieEnabled,
    onLine:navigator.onLine,
    screenW:window.screen.width,
    screenH:window.screen.height,
    pixelRatio:window.devicePixelRatio||1,
    deviceType:getDevType(),
    timezone:Intl.DateTimeFormat().resolvedOptions().timeZone,
    connection:getConn(),
    battery:null,
    ip:null,isp:null,city:null,country:null,region:null
  };
  // Battery API
  try{
    if(navigator.getBattery){
      const b=await navigator.getBattery();
      info.battery={level:Math.round(b.level*100),charging:b.charging,dischargingTime:b.dischargingTime};
    }
  }catch(_){}
  // IP Info with abort signal + timeout
  try{
    if(ipFetchAbort) ipFetchAbort.abort();
    ipFetchAbort=new AbortController();
    const timeout=setTimeout(()=>ipFetchAbort.abort(),6000);
    const r=await fetch('https://ipapi.co/json/',{signal:ipFetchAbort.signal});
    clearTimeout(timeout);
    if(r.ok){
      const d=await r.json();
      info.ip=d.ip; info.isp=d.org; info.city=d.city;
      info.country=d.country_name; info.region=d.region;
    }
  }catch(e){ if(e.name!=='AbortError') LOG.warn('IP fetch failed',e); }
  return info;
}

async function loadDeviceInfo(){
  try{
    currentDevInfo=await gatherDeviceInfo();
    renderNetBody();
    renderDevBody();
  }catch(e){ LOG.error('loadDeviceInfo',e); }
}

function reloadDevInfo(){ loadDeviceInfo(); }

function toggleAuto(){
  autoOn=!autoOn;
  const btn=document.getElementById('autoBtn');
  if(!btn)return;
  if(autoOn){
    btn.textContent=t('btn_stop_auto');
    btn.style.color='var(--danger)';
    btn.setAttribute('aria-pressed','true');
    autoTimer=setInterval(loadDeviceInfo,30000);
  } else {
    btn.textContent=t('btn_auto');
    btn.style.color='var(--muted)';
    btn.setAttribute('aria-pressed','false');
    clearInterval(autoTimer);
  }
}

function renderNetBody(){
  const d=currentDevInfo;
  if(!d){document.getElementById('netBody').innerHTML=`<div class="placeholder">No data</div>`;return;}
  const conn=d.connection;
  let netType='—';
  if(conn.type==='wifi') netType=t('wifi');
  else if(conn.effectiveType) netType='📶 '+conn.effectiveType.toUpperCase();
  document.getElementById('netBody').innerHTML=`
    ${infoRow(t('lbl_internet'),d.onLine?t('online'):t('offline'),d.onLine?'green':'danger')}
    ${infoRow(t('lbl_net_type'),netType,'accent')}
    ${conn.downlink?infoRow(t('lbl_download'),conn.downlink+' Mbps'):''}
    ${conn.rtt!=null?infoRow(t('lbl_rtt'),conn.rtt+'ms'):''}
    ${infoRow(t('lbl_savedata'),conn.saveData?t('yes'):t('no'))}
    <div class="divider"></div>
    ${infoRow(t('lbl_ip'),d.ip||'...','mono accent',true)}
    ${infoRow(t('lbl_isp'),d.isp,'orange')}
    ${infoRow(t('lbl_city'),d.city)}
    ${infoRow(t('lbl_region'),d.region)}
    ${infoRow(t('lbl_country'),d.country)}
  `;
}

function renderDevBody(){
  const d=currentDevInfo;
  if(!d){document.getElementById('devBody').innerHTML=`<div class="placeholder">No data</div>`;return;}
  let batHtml='';
  if(d.battery){
    const bc=d.battery.level>50?'var(--green)':d.battery.level>20?'var(--orange)':'var(--danger)';
    const timeLeft=d.battery.dischargingTime>0&&d.battery.dischargingTime!==Infinity
      ?infoRow(t('lbl_time_left'),t('lbl_approx_time',Math.round(d.battery.dischargingTime/60)),'orange'):'';
    batHtml=`
      <div class="bat-row" role="group" aria-label="${t('lbl_bat')}">
        <div class="bat-track" role="progressbar" aria-valuenow="${d.battery.level}" aria-valuemin="0" aria-valuemax="100">
          <div class="bat-fill" style="width:${d.battery.level}%;background:${bc}"></div>
        </div>
        <div class="bat-val" style="color:${bc}">${d.battery.charging?'⚡':'🔋'}${d.battery.level}%</div>
      </div>
      ${infoRow(t('lbl_charging'),d.battery.charging?t('charging_yes'):t('charging_no'),d.battery.charging?'green':'muted')}
      ${timeLeft}
    `;
  } else {
    batHtml=infoRow(t('lbl_bat'),t('lbl_bat_no'),'muted');
  }
  document.getElementById('devBody').innerHTML=`
    ${infoRow(t('lbl_dev_type'),d.deviceType)}
    ${infoRow(t('lbl_platform'),d.platform)}
    ${infoRow(t('lbl_browser'),d.browser)}
    ${infoRow(t('lbl_lang'),d.language)}
    ${infoRow(t('lbl_tz'),d.timezone)}
    ${infoRow(t('lbl_screen'),d.screenW+'×'+d.screenH+' · '+d.pixelRatio+'x')}
    ${infoRow(t('lbl_cookies'),d.cookiesEnabled?t('cookies_on'):t('cookies_off'))}
    <div class="divider"></div>
    ${batHtml}
  `;
}

/* ── RECOVER ───────────────────────────────────────────────── */
let recoverOpen=false;
function toggleRecover(){
  recoverOpen=!recoverOpen;
  const panel=document.getElementById('recoverPanel');
  const toggle=document.getElementById('recoverToggle');
  if(panel) panel.style.display=recoverOpen?'block':'none';
  if(toggle) toggle.setAttribute('aria-expanded',recoverOpen);
  const lbl=document.getElementById('recoverToggleLabel');
  if(lbl) lbl.textContent=recoverOpen?t('recover_toggle_close'):t('recover_toggle');
}

function doRecover(){
  const email=(document.getElementById('recEmail').value||'').trim().toLowerCase();
  document.getElementById('recoverAlert').innerHTML='';
  document.getElementById('recoverResult').innerHTML='';
  if(!email||!SEC.validateEmail(email)) return document.getElementById('recoverAlert').innerHTML=alertHtml(t('err_no_email'));
  setButtonLoading('recoverBtn',true);
  // Small delay to feel realistic
  setTimeout(()=>{
    try{
      const u=DB.find(email);
      if(!u){ document.getElementById('recoverAlert').innerHTML=alertHtml(t('err_no_user')); return; }
      const s=DB.getSnap(email);
      if(!s){ document.getElementById('recoverAlert').innerHTML=alertHtml(t('err_no_snap'),'warn'); return; }
      document.getElementById('recoverResult').innerHTML=`
        <div class="recover-result" role="region" aria-label="${t('recover_found')}">
          <div style="font-family:var(--font-display);font-weight:700;color:var(--danger);font-size:13px;letter-spacing:1px;margin-bottom:12px">${t('recover_found')}</div>
          ${infoRow(t('lbl_name_r'),SEC.sanitize(u.name))}
          ${infoRow(t('lbl_sim'),SEC.sanitize(u.phone),'green')}
          ${infoRow(t('lbl_last_seen'),fmt(s.ts),'accent')}
          <div class="recover-gps">
            <div class="rk">${t('gps_label')}</div>
            <div class="rv">${s.lat.toFixed(7)}, ${s.lng.toFixed(7)}</div>
            <div class="ra">${t('accuracy')}: ±${s.accuracy}m</div>
          </div>
          <div class="map-btns">
            <a class="map-btn gmap" href="https://www.google.com/maps?q=${s.lat},${s.lng}" target="_blank" rel="noopener noreferrer">${t('gmap')}</a>
            <a class="map-btn amap" href="https://maps.apple.com/?q=${s.lat},${s.lng}" target="_blank" rel="noopener noreferrer">${t('amap')}</a>
          </div>
        </div>`;
      LOG.info('Recover success',{email});
    }catch(e){ LOG.error('Recover error',e); }
    finally{ setButtonLoading('recoverBtn',false); }
  }, 500);
}

/* ═══════════════════════════════════════════════════════════════
   LOGOUT
   ═══════════════════════════════════════════════════════════════ */
function logout(){
  currentUser=null; currentSnap=null; currentDevInfo=null;
  if(watchId){ navigator.geolocation.clearWatch(watchId); watchId=null; }
  if(autoTimer){ clearInterval(autoTimer); autoTimer=null; } autoOn=false;
  if(ipFetchAbort){ ipFetchAbort.abort(); ipFetchAbort=null; }
  DB.clearSession();
  DB._cache={};
  document.getElementById('dashboard').style.display='none';
  document.getElementById('logoutBtn').style.display='none';
  page='login'; renderAuth();
  LOG.info('Logout');
}

/* ═══════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════ */
(function init(){
  // Migrate old DB
  DB.migrate();
  // Restore language
  try{
    const saved=localStorage.getItem('pf_lang');
    if(saved && LANGS[saved]) lang=saved;
  }catch(_){}
  setLang(lang);
  // Check for valid session (auto-login)
  const session=DB.getSession();
  if(session){
    const u=DB.find(session.email);
    if(u){ currentUser=u; renderDashboard(); return; }
  }
  renderAuth();
  // Network change listener
  if(navigator.connection){
    navigator.connection.addEventListener('change',()=>{
      if(currentDevInfo && currentUser){ loadDeviceInfo(); }
    });
  }
  // Visibility change — refresh on return
  document.addEventListener('visibilitychange',()=>{
    if(!document.hidden && currentUser){ loadDeviceInfo(); }
  });
  LOG.info('App initialized',{lang,version:'3.0'});
})();
</script>
